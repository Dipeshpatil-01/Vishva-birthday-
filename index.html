<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vishva Reel 🎬</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Poppins',sans-serif;
  background:black;
  overflow:hidden;
}

/* Reel Container */
.reel{
  height:100vh;
  width:100vw;
  position:relative;
}

.slide{
  position:absolute;
  height:100%;
  width:100%;
  opacity:0;
  transition:1s;
}

.slide img{
  height:100%;
  width:100%;
  object-fit:cover;
}

.active{
  opacity:1;
}

/* Text Overlay */
.overlay{
  position:absolute;
  bottom:80px;
  left:20px;
  color:white;
}

.overlay h1{
  font-size:1.5rem;
  margin-bottom:10px;
}

.overlay p{
  font-size:1rem;
}

/* Floating hearts */
.heart{
  position:absolute;
  color:red;
  animation:floatUp 4s linear infinite;
}

@keyframes floatUp{
  0%{transform:translateY(0);opacity:1}
  100%{transform:translateY(-100vh);opacity:0}
}

/* Tap hint */
.tap{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  color:white;
  font-size:0.9rem;
  opacity:0.7;
}
</style></head><body><div class="reel" onclick="nextSlide()">  <div class="slide active">
    <img src="image 1.jpg">
    <div class="overlay">
      <h1>Dear Vishva 💖</h1>
      <p>You are my best friend ✨</p>
    </div>
  </div>  <div class="slide">
    <img src="image 2.jpg">
    <div class="overlay">
      <h1>Every Moment 😊</h1>
      <p>With you is special 💫</p>
    </div>
  </div>  <div class="slide">
    <img src="image 3.jpg">
    <div class="overlay">
      <h1>Stay Happy 🎂</h1>
      <p>Always smiling ❤️</p>
    </div>
  </div>  <div class="slide">
    <img src="photo4.jpg">
    <div class="overlay">
      <h1>Happy Birthday 🎉</h1>
      <p>My Favorite Person 💕</p>
    </div>
  </div>  <div class="tap">Tap anywhere ❤️</div></div><audio id="music" src="her.mp3" loop></audio>

<script>
let slides=document.querySelectorAll('.slide');
let index=0;

function showSlide(i){
  slides.forEach(s=>s.classList.remove('active'));
  slides[i].classList.add('active');
}

function nextSlide(){
  index++;
  if(index>=slides.length) index=0;
  showSlide(index);
  document.getElementById('music').play();
  createHeart();
}

/* Auto play like reel */
setInterval(()=>{
  nextSlide();
},3000);

/* Hearts */
function createHeart(){
  let heart=document.createElement('div');
  heart.className='heart';
  heart.innerHTML='❤️';
  heart.style.left=Math.random()*100+'vw';
  heart.style.bottom='0';
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),4000);
}
</script></body>
</html>
