<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vishva Birthday 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Poppins',sans-serif;
  background:black;
  color:white;
  overflow:hidden;
}

.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.cake{
  font-size:90px;
  cursor:pointer;
}

.hidden{display:none}

/* FULL SCREEN SLIDER */
.slider{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

.slides{
  display:flex;
  height:100%;
  transition:transform 0.8s ease-in-out;
}

.slide{
  min-width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  background:black;
}

.slide img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
  animation:zoom 6s ease-in-out infinite;
}

@keyframes zoom{
  0%{transform:scale(1)}
  50%{transform:scale(1.1)}
  100%{transform:scale(1)}
}

/* TEXT OVERLAY */
.text{
  position:absolute;
  bottom:40px;
  left:20px;
  background:rgba(0,0,0,0.5);
  padding:10px;
  border-radius:10px;
}

/* FINAL POPUP */
.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#ff4d6d;
  padding:30px;
  border-radius:20px;
  text-align:center;
  display:none;
  z-index:100;
}

/* HEARTS */
.heart{
  position:fixed;
  bottom:0;
  animation:floatUp 4s linear infinite;
}

@keyframes floatUp{
  0%{transform:translateY(0);opacity:1}
  100%{transform:translateY(-100vh);opacity:0}
}

</style></head><body><div class="container" id="start">
  <h1>Tap the Cake 🎂</h1>
  <div class="cake" onclick="cutCake()">🎂</div>
</div><div id="surprise" class="hidden">
  <div class="slider">
    <div class="slides" id="slides"><div class="slide">
    <img src="photo1.jpg">
    <div class="text">Dear Vishva 💖</div>
  </div>

  <div class="slide">
    <img src="photo2.jpg">
    <div class="text">You are my best friend ✨</div>
  </div>

  <div class="slide">
    <img src="photo3.jpg">
    <div class="text">Stay happy always 😊</div>
  </div>

  <div class="slide">
    <img src="photo4.jpg">
    <div class="text">Enjoy your day 🎂</div>
  </div>

</div>

  </div>
</div><div class="popup" id="popup">
  <h2>Happy Birthday Vishva 🎉</h2>
  <p>You mean a lot to me ❤️</p>
</div><audio id="music" src="her.mp3" loop></audio>

<script>
let index=0;
let startX=0;

function cutCake(){
  document.getElementById('start').style.display='none';
  document.getElementById('surprise').classList.remove('hidden');
  document.getElementById('music').play();

  startSlider();
  createHearts();
}

function startSlider(){
  const slides=document.getElementById('slides');

  setInterval(()=>{
    index++;

    if(index>=slides.children.length){
      index=slides.children.length-1;
      showPopup();
      return;
    }

    slides.style.transform=`translateX(-${index*100}%)`;
  },3000);
}

/* SWIPE SUPPORT */
document.addEventListener('touchstart',e=>{
  startX=e.touches[0].clientX;
});

document.addEventListener('touchend',e=>{
  let endX=e.changedTouches[0].clientX;

  if(endX < startX){ nextSlide(); }
  if(endX > startX){ prevSlide(); }
});

function nextSlide(){
  const slides=document.getElementById('slides');
  if(index < slides.children.length-1){
    index++;
    slides.style.transform=`translateX(-${index*100}%)`;
  }
}

function prevSlide(){
  const slides=document.getElementById('slides');
  if(index>0){
    index--;
    slides.style.transform=`translateX(-${index*100}%)`;
  }
}

/* POPUP */
function showPopup(){
  document.getElementById('popup').style.display='block';
}

/* HEARTS */
function createHearts(){
  setInterval(()=>{
    let heart=document.createElement('div');
    heart.className='heart';
    heart.innerHTML='❤️';
    heart.style.left=Math.random()*100+'vw';
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),4000);
  },300);
}
</script></body>
</html>
