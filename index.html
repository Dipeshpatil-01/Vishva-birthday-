<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vishva's Birthday 🎉</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
}

/* SLIDES */
.slide {
  height: 100vh;
  width: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  background: linear-gradient(135deg, #ffd1dc, #ffb6c1);
  color: #333;
  transition: 0.5s;
}

.active {
  display: flex;
}

/* TEXT */
h1 {
  font-size: 2.5rem;
  cursor: pointer;
}

p {
  font-size: 1.2rem;
}

/* BUTTON */
button {
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: #ff69b4;
  color: white;
  font-size: 16px;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #ff1493;
}

/* IMAGE */
img {
  max-width: 80%;
  border-radius: 20px;
  margin: 10px;
}

/* TAP TEXT */
.tap-text {
  margin-top: 15px;
  font-size: 18px;
  color: #555;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0.3; }
}

/* 🎉 CONFETTI */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  background: pink;
  top: -10px;
  animation: fall 3s linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
  }
}

/* 💖 HEARTS */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 20px;
  animation: floatUp 4s linear infinite;
}

@keyframes floatUp {
  to {
    transform: translateY(-100vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="music" loop>
  <source src="her.mp3" type="audio/mpeg">
</audio>

<!-- SLIDE 1 -->
<div class="slide active">
  <h1 onclick="cutCake()">🎂 Happy Birthday Vishva 🎂</h1>
  <p class="tap-text">Tap to cut the cake 🎉</p>
  <button onclick="nextSlide()">Next ➡</button>
</div>

<!-- SLIDE 2 -->
<div class="slide">
  <img src="photo1.jpg">
  <p> The little one cutie 💖</p>
  <button onclick="nextSlide()">Next ➡</button>
</div>

<!-- SLIDE 3 -->
<div class="slide">
  <img src="photo2.jpg">
  <p>just beautiful looking you 🫠✨</p>
  <button onclick="nextSlide()">Next ➡</button>
</div>

<!-- SLIDE 4 -->
<div class="slide">
  <img src="photo3.jpg">
  <p>Stay happy and healthy always 😊</p>
  <button onclick="nextSlide()">Next ➡</button>
</div>

<script>
let currentSlide = 0;
const slides = document.querySelectorAll(".slide");

// NEXT SLIDE
function nextSlide() {
  slides[currentSlide].classList.remove("active");
  currentSlide = (currentSlide + 1) % slides.length;
  slides[currentSlide].classList.add("active");
}

// 🎂 CUT CAKE
function cutCake() {
  document.getElementById("music").play();

  // 🎉 CONFETTI
  for (let i = 0; i < 30; i++) {
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = ["#ff69b4","#ff1493","#ffc0cb"][Math.floor(Math.random()*3)];
    c.style.animationDuration = (Math.random()*2+2) + "s";
    document.body.appendChild(c);

    setTimeout(()=>c.remove(),3000);
  }

  // 💖 HEARTS
  for (let i = 0; i < 15; i++) {
    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "💖";
    h.style.left = Math.random() * 100 + "vw";
    h.style.animationDuration = (Math.random()*2+3) + "s";
    document.body.appendChild(h);

    setTimeout(()=>h.remove(),4000);
  }

  // message
  setTimeout(()=>{
    alert("Cake cut ho gaya 🎂💖");
  },500);
}
</script>

</body>
</html>
