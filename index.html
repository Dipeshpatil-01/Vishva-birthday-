<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday Vishva 🎉</title>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: white;
      overflow-x: hidden;
    }

    h1 {
      font-size: 3em;
      margin-top: 30px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px white; }
      to { text-shadow: 0 0 30px yellow; }
    }

    img {
      width: 250px;
      margin: 15px;
      border-radius: 20px;
      box-shadow: 0 0 20px pink;
      transition: transform 0.3s;
    }

    img:hover {
      transform: scale(1.1);
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      background: white;
      color: #ff4b5c;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background: pink;
      color: white;
    }

    #message {
      font-size: 22px;
      margin-top: 20px;
      display: none;
    }

    .hearts {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .heart {
      position: absolute;
      color: red;
      animation: float 5s infinite;
    }

    @keyframes float {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(-800px); opacity: 0; }
    }
  </style>
</head>

<body>

  <h1 id="text"></h1>

  <!-- Photos -->
  <img src="photo1.jpg">
  <img src="photo2.jpg">
  <img src="photo3.jpg">

  <!-- Button -->
  <br>
  <button onclick="showMessage()">Click for Surprise 🎁</button>

  <div id="message">
    💖 You are the best person in my life 💖 <br>
    Happy Birthday once again Vishva 🎂🎉
  </div>

  <!-- Music -->
  <audio autoplay loop>
    <source src="song.mp3" type="audio/mpeg">
  </audio>

  <!-- Hearts -->
  <div class="hearts" id="hearts"></div>

  <script>
    // Typing effect
    let msg = "Happy Birthday Vishva 💖";
    let i = 0;
    function type() {
      if (i < msg.length) {
        document.getElementById("text").innerHTML += msg.charAt(i);
        i++;
        setTimeout(type, 100);
      }
    }
    type();

    // Surprise button
    function showMessage() {
      document.getElementById("message").style.display = "block";
    }

    // Floating hearts
    function createHeart() {
      let heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "💖";
      heart.style.left = Math.random() * 100 + "%";
      heart.style.fontSize = Math.random() * 20 + 20 + "px";
      document.getElementById("hearts").appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 5000);
    }

    setInterval(createHeart, 300);
  </script>

</body>
</html>
