<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vishva Birthday 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#ff758c,#ff7eb3);
  color:white;
  overflow:hidden;
}

/* Container */
.container{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

h1{margin-bottom:10px}

/* Slider */
.slider{
  position:relative;
  width:90%;
  max-width:400px;
  height:70vh;
  overflow:hidden;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.slides{
  display:flex;
  width:400%;
  height:100%;
  transition:transform 0.6s ease-in-out;
}

.slide{
  width:100%;
  flex-shrink:0;
  position:relative;
}

.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* Overlay text */
.text{
  position:absolute;
  bottom:20px;
  left:20px;
  font-size:1.2rem;
  background:rgba(0,0,0,0.4);
  padding:10px;
  border-radius:10px;
}

/* Buttons */
.btns{
  margin-top:15px;
}

button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:white;
  color:#ff4d6d;
  font-weight:bold;
}

/* Dots */
.dots{
  position:absolute;
  bottom:10px;
  width:100%;
  text-align:center;
}

.dot{
  height:10px;
  width:10px;
  margin:0 5px;
  display:inline-block;
  background:white;
  border-radius:50%;
  opacity:0.5;
}

.active-dot{opacity:1}

/* Hearts */
.heart{
  position:fixed;
  bottom:0;
  animation:floatUp 4s linear infinite;
}

@keyframes floatUp{
  0%{transform:translateY(0);opacity:1}
  100%{transform:translateY(-100vh);opacity:0}
}

</style></head><body><div class="container">
  <h1>Happy Birthday Vishva 🎉</h1>  <div class="slider">
    <div class="slides" id="slides"><div class="slide">
    <img src="photo1.jpg">
    <div class="text">Dear Vishva 💖</div>
  </div>

  <div class="slide">
    <img src="photo2.jpg">
    <div class="text">You are my best friend ✨</div>
  </div>

  <div class="slide">
    <img src="photo3.jpg">
    <div class="text">Every moment is special 😊</div>
  </div>

  <div class="slide">
    <img src="photo4.jpg">
    <div class="text">Happy Birthday 🎂</div>
  </div>

</div>

<div class="dots" id="dots"></div>

  </div>  <div class="btns">
    <button onclick="prevSlide()">⬅</button>
    <button onclick="nextSlide()">➡</button>
  </div>
</div><audio id="music" src="her.mp3" loop></audio>

<script>
let index=0;
const slides=document.getElementById('slides');
const total=4;
const dotsContainer=document.getElementById('dots');

// create dots
for(let i=0;i<total;i++){
  let d=document.createElement('span');
  d.className='dot';
  dotsContainer.appendChild(d);
}

function update(){
  slides.style.transform=`translateX(-${index*100}%)`;
  let dots=document.querySelectorAll('.dot');
  dots.forEach(d=>d.classList.remove('active-dot'));
  dots[index].classList.add('active-dot');
}

function nextSlide(){
  index=(index+1)%total;
  update();
  playEffects();
}

function prevSlide(){
  index=(index-1+total)%total;
  update();
  playEffects();
}

function playEffects(){
  document.getElementById('music').play();
  createHeart();
}

// auto slide
setInterval(nextSlide,3000);

// hearts
function createHeart(){
  let heart=document.createElement('div');
  heart.className='heart';
  heart.innerHTML='❤️';
  heart.style.left=Math.random()*100+'vw';
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),4000);
}

// init
update();
</script></body>
</html>
