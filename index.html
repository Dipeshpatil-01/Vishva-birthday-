<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vishva Birthday 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#ff758c,#ff7eb3);
  color:white;
  text-align:center;
  overflow:hidden;
}

.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

h1{margin-bottom:20px}

.cake{
  font-size:80px;
  cursor:pointer;
}

.hidden{display:none}

/* ✅ MOBILE FIXED SLIDER */
.slider{
  position:relative;
  width:90vw;
  max-width:400px;
  height:60vh;
  overflow:hidden;
  border-radius:20px;
}

.slides{
  display:flex;
  width:100%;
  height:100%;
}

.slide{
  min-width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
  flex-shrink:0;
}

.slide img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}

.text{
  position:absolute;
  bottom:20px;
  left:20px;
  background:rgba(0,0,0,0.5);
  padding:8px;
  border-radius:10px;
}

.heart{
  position:fixed;
  bottom:0;
  animation:floatUp 4s linear infinite;
}

@keyframes floatUp{
  0%{transform:translateY(0);opacity:1}
  100%{transform:translateY(-100vh);opacity:0}
}
</style></head><body><div class="container">  <h1>Tap the Cake 🎂</h1>  <div class="cake" onclick="cutCake()">🎂</div>  <div id="surprise" class="hidden">
    <h1>Happy Birthday Vishva 🎉</h1><div class="slider">
  <div class="slides" id="slides">

    <div class="slide">
      <img src="photo1.jpg">
      <div class="text">Dear Vishva 💖</div>
    </div>

    <div class="slide">
      <img src="photo2.jpg">
      <div class="text">You are my best friend ✨</div>
    </div>

    <div class="slide">
      <img src="photo3.jpg">
      <div class="text">Stay happy always 😊</div>
    </div>

    <div class="slide">
      <img src="photo4.jpg">
      <div class="text">Enjoy your day 🎂</div>
    </div>

  </div>
</div>

  </div></div><audio id="music" src="her.mp3"></audio>

<script>
let index=0;
let interval;

function cutCake(){
  document.querySelector('.cake').innerHTML='🍰';
  document.getElementById('surprise').classList.remove('hidden');
  document.getElementById('music').play();

  startSlider();
  createHearts();
}

/* ✅ FIXED SLIDER LOGIC */
function startSlider(){
  const slides=document.getElementById('slides');

  interval=setInterval(()=>{
    index++;
    if(index>=slides.children.length) index=0;

    slides.style.transform=`translateX(-${index * 100}%)`;
  },2500);
}

/* ❤️ Hearts */
function createHearts(){
  setInterval(()=>{
    let heart=document.createElement('div');
    heart.className='heart';
    heart.innerHTML='❤️';
    heart.style.left=Math.random()*100+'vw';
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),4000);
  },300);
}
</script></body>
</html>
