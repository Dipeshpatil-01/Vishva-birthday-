<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Vishva!</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --primary-pink: #ff6b6b;
            --soft-gold: #ffd700;
            --bg-color: #fff5f5;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            overflow-x: hidden;
            text-align: center;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
        }

        h1 {
            font-size: 4rem;
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            margin-bottom: 10px;
        }

        /* Floating Balloons Animation */
        .balloon {
            position: absolute;
            bottom: -100px;
            width: 50px;
            height: 70px;
            background: var(--primary-pink);
            border-radius: 50%;
            animation: float 8s infinite ease-in;
            z-index: 1;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(20deg); opacity: 0; }
        }

        /* Photo Section */
        .gallery-container {
            padding: 50px 20px;
            background: white;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .photo-card {
            border: 8px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            background: #eee;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-card:hover {
            transform: scale(1.05) rotate(2deg);
        }

        /* Music Controls */
        .music-box {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: white;
            padding: 10px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        button {
            background: var(--primary-pink);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="music-box">
        <button onclick="toggleMusic()">🎵 Play Birthday Song</button>
        <audio id="bdaySong" loop>
            <source src="her.mp3" type="audio/mpeg">
            </audio>
    </div>

    <section class="hero">
        <h1 class="animate__animated animate__bounceInDown">Happy Birthday, <span style="color: var(--soft-gold);">Vishva</span>!</h1>
        <p class="animate__animated animate__fadeIn animate__delay-1s">To the best friend anyone could ask for.</p>
        <div id="balloon-container"></div>
    </section>

    <section class="gallery-container">
        <h2 style="color: var(--primary-pink); font-size: 2.5rem;">Our Memories</h2>
        <div class="gallery">
            <div class="photo-card"><img src="photo1.com/300" alt="Memory 1"></div>
            <div class="photo-card"><img src="photo2.com/300" alt="Memory 2"></div>
            <div class="photo-card"><img src="photo3.com/300" alt="Memory 3"></div>
            <div class="photo-card"><img src="photo4.com/300" alt="Memory 4"></div>
        </div>
    </section>

    <script>
        // Music Toggle
        function toggleMusic() {
            const song = document.getElementById('bdaySong');
            const btn = document.querySelector('.music-box button');
            if (song.paused) {
                song.play();
                btn.innerHTML = "⏸ Pause Music";
            } else {
                song.pause();
                btn.innerHTML = "🎵 Play Birthday Song";
            }
        }

        // Generate Random Balloons
        function createBalloons(num) {
            const container = document.getElementById('balloon-container');
            for (let i = 0; i < num; i++) {
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.style.left = Math.random() * 100 + 'vw';
                balloon.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 70%)`;
                balloon.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(balloon);
            }
        }
        createBalloons(20);
    </script>
</body>
</html>
