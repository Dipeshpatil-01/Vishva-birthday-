<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD // Bestie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div id="canvas-container" class="fixed inset-0"></div>
    
    <main class="relative z-10 flex items-center justify-center min-h-screen">
        <div id="card" class="glass p-8 rounded-2xl max-w-lg text-center text-white shadow-2xl">
            <h1 class="text-4xl font-bold mb-4 tracking-tighter uppercase">Initializing Celebration...</h1>
            <div id="terminal" class="text-left text-green-400 mb-6 h-32 overflow-hidden text-sm"></div>
            <button onclick="startCelebration()" id="action-btn" class="px-6 py-2 border border-white hover:bg-white hover:text-black transition-all duration-300 tracking-widest uppercase">
                Unlock Memories
            </button>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
