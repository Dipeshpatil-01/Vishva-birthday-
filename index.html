<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vishva's Birthday 🎉</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
}

/* SLIDES */
.slide {
  height: 100vh;
  width: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  
  /* 🔥 LIGHT PINK BACKGROUND */
  background: linear-gradient(135deg, #ffd1dc, #ffb6c1);
  color: #333;
}

.active {
  display: flex;
}

/* TEXT */
h1 {
  font-size: 2.5rem;
}

p {
  font-size: 1.2rem;
}

/* BUTTON */
button {
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: #ff69b4;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #ff1493;
}

/* IMAGE */
img {
  max-width: 80%;
  border-radius: 20px;
  margin: 10px;
}

</style>
</head>

<body>

<!-- SLIDE 1 -->
<div class="slide active">
  <h1>Happy Birthday Vishva 🎂</h1>
  <button onclick="nextSlide()">Next ➡</button>
</div>

<!-- SLIDE 2 -->
<div class="slide">
  <img src="photo1.jpg">
  <p>little one cutie 💖</p>
  <button onclick="nextSlide()">Next ➡</button>
</div>

<!-- SLIDE 3 -->
<div class="slide">
  <img src="photo2.jpg">
  <p>just beautiful u 🫠✨</p>
  <button onclick="nextSlide()">Next ➡</button>
</div>

<!-- SLIDE 4 -->
<div class="slide">
  <img src="photo3.jpg">
  <p>Stay happy always 😊</p>
  <button onclick="nextSlide()">Next ➡</button>
</div>
  <audio autoplay loop>
  <source src="her.mp3" type="audio/mpeg">
  </audio>

<script>
let currentSlide = 0;
const slides = document.querySelectorAll(".slide");

function nextSlide() {
  slides[currentSlide].classList.remove("active");
  currentSlide = (currentSlide + 1) % slides.length;
  slides[currentSlide].classList.add("active");
}
</script>

</body>
</html>
